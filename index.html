<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fernanda Silva Nail Designer | Agenda</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b090b;
        --surface: #181114;
        --line: rgba(210, 161, 63, 0.18);
        --text: #f4ece3;
        --text-soft: #b9aca1;
        --gold: #d4a74d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(210, 161, 63, 0.18), transparent 24%),
          linear-gradient(180deg, #060506 0%, #100c0e 48%, #090708 100%);
      }
      .card {
        width: min(680px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(26, 18, 21, 0.96), rgba(14, 10, 12, 0.94));
        border: 1px solid var(--line);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        text-align: center;
      }
      img {
        width: min(280px, 70vw);
        height: auto;
        display: block;
        margin: 0 auto 24px;
        padding: 18px 22px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(241, 234, 221, 0.98), rgba(220, 209, 186, 0.94));
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 2.8rem); }
      p { margin: 0 0 18px; color: var(--text-soft); line-height: 1.6; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--gold), #f1ca77);
        color: #160f09;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="./frontend/public/brand/fernanda-silva-logo.png" alt="Fernanda Silva Nail Designer" />
      <h1>Agenda web</h1>
      <p>Abra a aplicacao servida pelo backend para usar a agenda completa da Fernanda Silva Nail Designer.</p>
      <a href="http://localhost:3001">Abrir em localhost:3001</a>
    </main>
  </body>
</html>
