<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Belle Studio — Agendamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ─── Reset ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#f7f5f2;color:#1c1917;
  font-size:14px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}

/* ─── Tokens ─────────────────────────────────────── */
:root{
  --rose:#d63371;--rose-d:#b5274f;--rose-l:#fff0f5;--rose-m:#fce7ef;
  --ink:#1c1917;--ink2:#44403c;--ink3:#78716c;--ink4:#a8a29e;
  --bd:#e7e5e4;--bd2:#d6d3d1;
  --surf:#ffffff;--surf2:#fafaf9;--bg:#f7f5f2;
  --sb:#12100e;--sb2:#1c1917;--sb3:#292524;
  --green:#059669;--gr-bg:#ecfdf5;--gr-bd:#6ee7b7;
  --amber:#d97706;--am-bg:#fffbeb;--am-bd:#fcd34d;
  --red:#dc2626;--rd-bg:#fef2f2;--rd-bd:#fca5a5;
  --blue:#2563eb;--bl-bg:#eff6ff;--bl-bd:#93c5fd;
  --pu:#7c3aed;--pu-bg:#f5f3ff;--pu-bd:#c4b5fd;
  --r:10px;--rl:14px;--rxl:20px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.04);
  --shl:0 20px 48px rgba(0,0,0,.14);
}
/* ─── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ─── Animations ─────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes barUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}

.fu{animation:fadeUp .3s ease both}
.sl{animation:slideR .24s ease both}
.spin{animation:spin .75s linear infinite}

/* ─── Layout ─────────────────────────────────────── */
.layout{display:flex;height:100vh;overflow:hidden;flex-direction:column}
.sidebar{width:240px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main-area{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.page-wrap{padding:32px 36px;max-width:1060px}

/* ─── Cards ──────────────────────────────────────── */
.card{background:var(--surf);border:1px solid var(--bd);border-radius:var(--rl);box-shadow:var(--sh)}
.card-p{padding:22px 26px}
.ch{transition:box-shadow .15s,transform .15s}
.ch:hover{box-shadow:var(--shm);transform:translateY(-1px)}

/* ─── Fields ─────────────────────────────────────── */
.field{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--bd);border-radius:var(--r);
  color:var(--ink);background:var(--surf);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(214,51,113,.12)}
.field::placeholder{color:var(--ink4)}
select.field{cursor:pointer}

/* ─── Calendar grid ──────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
.cal-day{height:52px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;border-radius:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cal-day:hover{background:#f0edeb}
.cal-day.selected{background:var(--rose-l);border:1.5px solid var(--rose)}
.cal-day.today-mark{font-weight:700}
.cal-day.has-appts::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--rose);position:absolute;bottom:5px}
.cal-day.other-month{opacity:.3}

/* ─── Chart bars ─────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar{width:100%;border-radius:6px 6px 0 0;transform-origin:bottom;animation:barUp .6s ease both;transition:opacity .15s}
.bar:hover{opacity:.8}
.bar-label{font-size:10px;color:var(--ink4);font-weight:500;text-align:center}
.bar-val{font-size:9px;color:var(--ink3);font-weight:600;text-align:center}

/* ─── Responsive ─────────────────────────────────── */
@media(max-width:720px){
  .sidebar{display:none}
  .page-wrap{padding:16px 14px}
  .hide-mob{display:none!important}
  .cal-layout{grid-template-columns:1fr!important}
  .report-grid{grid-template-columns:1fr!important}
  .kpi-grid{grid-template-columns:1fr 1fr!important}
  .dash-grid{grid-template-columns:1fr!important}
  .client-stats{display:none!important}
  .svc-grid{grid-template-columns:1fr 1fr!important}
  .mob-col{flex-direction:column!important}
  .mob-hide{display:none!important}
}

/* ─── Mobile overrides ───────────────────────────────── */
@media(max-width:720px){
  /* Modal como bottom sheet */
  .modal-overlay{align-items:flex-end!important;padding:0!important}
  .modal-box{border-radius:20px 20px 0 0!important;max-height:85vh!important}

  /* Booking wizard: 3 colunas de horários */
  .time-grid{grid-template-columns:repeat(3,1fr)!important}

  /* Client portal nav tabs */
  .client-nav{overflow-x:auto;white-space:nowrap}

  /* Appt card actions stack */
  .appt-row{flex-wrap:wrap;gap:10px}
  .appt-actions{flex-wrap:wrap;gap:6px}

  /* Calendar */
  .cal-day{height:42px!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
"use strict";
const {useState,useEffect,useCallback,useRef,useMemo} = React;

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const uid=()=>Math.random().toString(36).slice(2,11);
const todayStr=()=>new Date().toISOString().split('T')[0];
const isoNow=()=>new Date().toISOString();
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const fmtR=v=>`R$ ${Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtRi=v=>`R$ ${Number(v||0).toFixed(0)}`;
const WEEKL=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONL=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MONFULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const fmtDate=d=>{if(!d)return'';const[,m,dy]=d.split('-');return`${+dy} de ${MONL[+m-1]}`};
const fmtDay=d=>WEEKL[new Date(d+'T12:00:00').getDay()]||'';
const fmtFull=(d,t)=>`${fmtDay(d)}, ${fmtDate(d)} às ${t}`;
const offsetDate=days=>{const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().split('T')[0]};
const getDaysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const getFirstDOW=(y,m)=>new Date(y,m,1).getDay();
const fmtPhone=v=>{const d=v.replace(/\D/g,'');if(d.length<=2)return d.length?`(${d}`:'';if(d.length<=7)return`(${d.slice(0,2)}) ${d.slice(2)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7,11)}`};

const TIME_SLOTS=['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30',
  '13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];

const STATUS_MAP={
  pending:  {label:'Pendente',  clr:'#d97706',bg:'#fffbeb',bd:'#fcd34d'},
  confirmed:{label:'Confirmado',clr:'#059669',bg:'#ecfdf5',bd:'#6ee7b7'},
  done:     {label:'Concluído', clr:'#7c3aed',bg:'#f5f3ff',bd:'#c4b5fd'},
  cancelled:{label:'Cancelado', clr:'#dc2626',bg:'#fef2f2',bd:'#fca5a5'},
};

/* ══════════════════════════════════════════
   SEED DATA
══════════════════════════════════════════ */
const SEED_SERVICES=[
  {id:'s1',name:'Manicure Simples',  icon:'🌸',duration:40,price:45,active:true},
  {id:'s2',name:'Pedicure Completa', icon:'🦶',duration:50,price:60,active:true},
  {id:'s3',name:'Gel Alongado',      icon:'💅',duration:90,price:120,active:true},
  {id:'s4',name:'Esmaltação em Gel', icon:'✨',duration:60,price:80,active:true},
  {id:'s5',name:'Combo Mani + Pedi', icon:'👑',duration:90,price:95,active:true},
];
const SEED_CLIENTS=[
  {id:'c1',name:'Maria Oliveira', phone:'(11) 99999-1111',email:'maria@email.com',   notes:'Cliente VIP',  createdAt:isoNow()},
  {id:'c2',name:'Fernanda Lima',  phone:'(11) 98888-2222',email:'fernanda@email.com',notes:'',             createdAt:isoNow()},
  {id:'c3',name:'Juliana Souza',  phone:'(11) 97777-3333',email:'juliana@email.com', notes:'Alérgica a acetona',createdAt:isoNow()},
  {id:'c4',name:'Ana Paula Costa',phone:'(11) 96666-4444',email:'ana@email.com',     notes:'',             createdAt:isoNow()},
];
const SEED_APPTS=()=>{
  const t=todayStr();
  return[
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s1',date:t,            time:'09:00',status:'confirmed',notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s4',date:t,            time:'11:00',status:'pending',  notes:''},
    {clientId:'c3',clientName:'Juliana Souza',  clientPhone:'(11) 97777-3333',serviceId:'s2',date:t,            time:'14:30',status:'confirmed',notes:''},
    {clientId:'c4',clientName:'Ana Paula Costa',clientPhone:'(11) 96666-4444',serviceId:'s3',date:offsetDate(2),time:'10:00',status:'confirmed',notes:''},
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s5',date:offsetDate(4),time:'09:30',status:'pending',  notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s3',date:offsetDate(-1),time:'10:00',status:'done',    notes:''},
    {clientId:'c3',clientName:'Juliana Souza',  clientPhone:'(11) 97777-3333',serviceId:'s1',date:offsetDate(-2),time:'09:00',status:'done',    notes:''},
    {clientId:'c4',clientName:'Ana Paula Costa',clientPhone:'(11) 96666-4444',serviceId:'s2',date:offsetDate(-3),time:'13:00',status:'done',    notes:''},
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s4',date:offsetDate(-5),time:'11:30',status:'done',    notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s1',date:offsetDate(-7),time:'08:30',status:'done',    notes:''},
    {clientId:'c3',clientName:'Juliana Souza',  clientPhone:'(11) 97777-3333',serviceId:'s5',date:offsetDate(-8),time:'14:00',status:'done',    notes:''},
    {clientId:'c4',clientName:'Ana Paula Costa',clientPhone:'(11) 96666-4444',serviceId:'s3',date:offsetDate(-10),time:'10:30',status:'done',   notes:''},
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s2',date:offsetDate(-12),time:'09:00',status:'done',   notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s4',date:offsetDate(-14),time:'13:30',status:'done',   notes:''},
    {clientId:'c3',clientName:'Juliana Souza',  clientPhone:'(11) 97777-3333',serviceId:'s1',date:offsetDate(-16),time:'08:00',status:'done',   notes:''},
    {clientId:'c4',clientName:'Ana Paula Costa',clientPhone:'(11) 96666-4444',serviceId:'s5',date:offsetDate(-18),time:'15:00',status:'cancelled',notes:''},
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s3',date:offsetDate(-20),time:'10:00',status:'done',   notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s2',date:offsetDate(-22),time:'09:30',status:'done',   notes:''},
    {clientId:'c3',clientName:'Juliana Souza',  clientPhone:'(11) 97777-3333',serviceId:'s4',date:offsetDate(-24),time:'13:00',status:'done',   notes:''},
    {clientId:'c4',clientName:'Ana Paula Costa',clientPhone:'(11) 96666-4444',serviceId:'s1',date:offsetDate(-26),time:'11:00',status:'done',   notes:''},
    {clientId:'c1',clientName:'Maria Oliveira', clientPhone:'(11) 99999-1111',serviceId:'s5',date:offsetDate(-28),time:'14:00',status:'done',   notes:''},
    {clientId:'c2',clientName:'Fernanda Lima',  clientPhone:'(11) 98888-2222',serviceId:'s3',date:offsetDate(-30),time:'10:00',status:'done',   notes:''},
  ].map(a=>({...a,id:uid(),createdAt:isoNow()}));
};

/* ══════════════════════════════════════════
   API LAYER
   — Se BACKEND_URL estiver configurado: usa o servidor Node.js real
   — Fallback: localStorage (modo offline/demo)
══════════════════════════════════════════ */

// ── Configuração ─────────────────────────────────────────
// Troque para a URL do seu servidor quando rodar o backend:
// const BACKEND_URL = 'http://localhost:3001';
// Detecta automaticamente se está rodando via backend
const BACKEND_URL = (window.location.port === '3001' || window.location.hostname !== '127.0.0.1' && window.location.hostname !== 'localhost')
  ? window.location.origin   // usa o próprio servidor
  : null;                    // modo demo (abrir direto no navegador)

// ── Cliente HTTP ─────────────────────────────────────────
async function http(method, path, body) {
  const res = await fetch(BACKEND_URL + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    ...(body ? { body: JSON.stringify(body) } : {}),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro no servidor');
  return data;
}

// ── localStorage Store (fallback offline) ─────────────────
const Store={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{localStorage.setItem(k,JSON.stringify(v));return v},
  del:k=>localStorage.removeItem(k),
  all:p=>Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>Store.get(k)).filter(Boolean),
};

const API={
  get _online(){ return !!BACKEND_URL; },

  /* ── INIT ── */
  async init(){
    if(this._online) return; // backend gerencia os dados
    if(Store.get('__bs3_v2_init__'))return;
    Store.set('bs3_services',SEED_SERVICES);
    SEED_CLIENTS.forEach(c=>Store.set('bs3_client_'+c.id,c));
    SEED_APPTS().forEach(a=>Store.set('bs3_appt_'+a.id,a));
    Object.keys(localStorage).filter(k=>k.startsWith('bs3_appt_')||k.startsWith('bs_appt_')||k.startsWith('belle_appt_')).forEach(k=>localStorage.removeItem(k));
    Store.set('__bs3_v2_init__',1);
  },

  /* ── APPOINTMENTS ── */
  async getAppointments(f={}){
    if(this._online){
      const params = new URLSearchParams();
      if(f.clientId) params.set('clientId', f.clientId);
      if(f.date)     params.set('date', f.date);
      return http('GET', '/api/appointments?' + params.toString());
    }
    await sleep(70);
    let l=Store.all('bs3_appt_');
    if(f.clientId)l=l.filter(a=>a.clientId===f.clientId);
    if(f.date)l=l.filter(a=>a.date===f.date);
    return l.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  },

  async createAppointment(d){
    if(this._online){
      return http('POST','/api/appointments',{
        clientId:   d.clientId,
        clientName: d.clientName,
        clientPhone:d.clientPhone,
        serviceId:  d.serviceId,
        date:       d.date,
        time:       d.time,
        notes:      d.notes||'',
        status:     d.status||'pending',
      });
    }
    await sleep(110);
    const a={...d,id:uid(),createdAt:isoNow()};
    Store.set('bs3_appt_'+a.id,a);return a;
  },

  async updateAppointment(id,patch){
    if(this._online) return http('PATCH',`/api/appointments/${id}`,patch);
    await sleep(90);
    const a=Store.get('bs3_appt_'+id);
    if(!a)throw new Error('Agendamento não encontrado');
    const u={...a,...patch,updatedAt:isoNow()};
    Store.set('bs3_appt_'+id,u);return u;
  },

  /* ── SERVICES ── */
  async getServices(){
    if(this._online) return http('GET','/api/services');
    await sleep(50);return Store.get('bs3_services')||SEED_SERVICES;
  },
  async updateService(id,patch){
    if(this._online) return http('PATCH',`/api/services/${id}`,patch);
    await sleep(70);
    const s=(Store.get('bs3_services')||SEED_SERVICES).map(x=>x.id===id?{...x,...patch}:x);
    Store.set('bs3_services',s);return s;
  },

  /* ── CLIENTS ── */
  async getClients(){
    if(this._online) return http('GET','/api/clients');
    await sleep(60);
    return Store.all('bs3_client_').sort((a,b)=>a.name.localeCompare(b.name));
  },
  async createClient(d){
    if(this._online) return http('POST','/api/clients',d);
    await sleep(100);
    if(!d.name?.trim())throw new Error('Nome obrigatório');
    if(!d.phone?.trim())throw new Error('Telefone obrigatório');
    const c={...d,id:uid(),createdAt:isoNow()};
    Store.set('bs3_client_'+c.id,c);return c;
  },
  async updateClient(id,patch){
    if(this._online) return http('PATCH',`/api/clients/${id}`,patch);
    await sleep(80);
    const c=Store.get('bs3_client_'+id);
    if(!c)throw new Error('Cliente não encontrada');
    const u={...c,...patch,updatedAt:isoNow()};
    Store.set('bs3_client_'+id,u);return u;
  },
  async deleteClient(id){
    await sleep(70);
    Store.del('bs3_client_'+id);
  },
};

/* ══════════════════════════════════════════
   UI ATOMS
══════════════════════════════════════════ */

/* Toast */
function useToast(){
  const [list,setList]=useState([]);
  const add=useCallback((msg,type='ok')=>{
    const id=uid();
    setList(l=>[...l,{id,msg,type}]);
    setTimeout(()=>setList(l=>l.filter(x=>x.id!==id)),3600);
  },[]);
  return{list,add};
}
function Toasts({list}){
  const C={ok:'#059669',err:'#dc2626',warn:'#d97706',info:'#2563eb'};
  return(
    <div style={{position:'fixed',top:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
      {list.map(t=>(
        <div key={t.id} style={{
          display:'flex',alignItems:'center',gap:10,padding:'12px 18px',
          background:'#1c1917',color:'#fafaf9',
          borderRadius:12,boxShadow:'0 8px 32px rgba(0,0,0,.4)',
          minWidth:260,maxWidth:360,animation:'toastIn .3s ease',
          fontSize:13,fontWeight:500,lineHeight:1.4,pointerEvents:'all',
        }}>
          <span style={{width:8,height:8,borderRadius:'50%',background:C[t.type]||C.ok,flexShrink:0,boxShadow:`0 0 0 3px ${C[t.type]||C.ok}30`}}/>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* Spinner */
function Spinner({sz=22,clr='#d63371'}){
  return<div style={{width:sz,height:sz,border:`2.5px solid ${clr}20`,borderTopColor:clr,borderRadius:'50%',flexShrink:0}} className="spin"/>;
}

/* Button */
function Btn({children,onClick,v='primary',sz='md',loading,disabled,full,style={}}){
  const VS={
    primary:{background:'linear-gradient(135deg,#d63371 0%,#b5274f 100%)',color:'#fff',border:'none',boxShadow:'0 2px 10px rgba(214,51,113,.32)'},
    ghost:  {background:'transparent',color:'#78716c',border:'1px solid #e7e5e4',boxShadow:'none'},
    danger: {background:'transparent',color:'#dc2626',border:'1px solid #fca5a5',boxShadow:'none'},
    success:{background:'transparent',color:'#059669',border:'1px solid #6ee7b7',boxShadow:'none'},
    dark:   {background:'#292524',color:'#fafaf9',border:'none',boxShadow:'none'},
    outline:{background:'transparent',color:'#d63371',border:'1.5px solid #d63371',boxShadow:'none'},
    soft:   {background:'#fff0f5',color:'#d63371',border:'1px solid #fce7ef',boxShadow:'none'},
  };
  const SZ={
    xs:{padding:'4px 9px',fontSize:11,borderRadius:7,gap:4},
    sm:{padding:'6px 13px',fontSize:12,borderRadius:8,gap:5},
    md:{padding:'9px 18px',fontSize:13,borderRadius:10,gap:6},
    lg:{padding:'12px 24px',fontSize:14,borderRadius:11,gap:7},
  };
  const s=VS[v]||VS.primary;
  const z=SZ[sz||'md'];
  return(
    <button onClick={onClick} disabled={disabled||loading}
      style={{...s,...z,fontWeight:600,display:'inline-flex',alignItems:'center',
        justifyContent:'center',gap:z.gap,width:full?'100%':'auto',
        transition:'all .15s',whiteSpace:'nowrap',
        opacity:disabled||loading?.5:1,cursor:disabled||loading?'not-allowed':'pointer',...style}}
      onMouseEnter={e=>{if(!disabled&&!loading)e.currentTarget.style.opacity='.86'}}
      onMouseLeave={e=>e.currentTarget.style.opacity='1'}
      onMouseDown={e=>{if(!disabled&&!loading)e.currentTarget.style.transform='scale(.97)'}}
      onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
    >
      {loading&&<Spinner sz={13} clr={v==='primary'?'#fff':'currentColor'}/>}
      {children}
    </button>
  );
}

/* Modal */
function Modal({open,onClose,title,children,width=480}){
  useEffect(()=>{
    document.body.style.overflow=open?'hidden':'';
    return()=>{document.body.style.overflow=''};
  },[open]);
  if(!open)return null;
  return(
    <div style={{
      position:'fixed',inset:0,background:'rgba(12,10,9,.6)',
      zIndex:800,display:'flex',alignItems:'flex-end',justifyContent:'center',padding:'0',paddingBottom:0,
      animation:'fadeIn .2s ease',
    }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{
        background:'#fff',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:width,
        maxHeight:'92vh',overflowY:'auto',

        </div>
        <div style={{padding:'24px 28px'}}>{children}</div>
      </div>
    </div>
  );
}

    try{
      const[a,s,c]=await Promise.all([API.getAppointments(),API.getServices(),API.getClients()]);
      setAppts(a);setSvcs(s);setClients(c);
    }catch{toast('Erro ao carregar dados','err')}

/* ── Dashboard Tab ─────────────────────────────────────── */
function DashTab({appts,getSvc,today}){
  const isMob=useIsMobile();
  const curMonth=today.slice(0,7);
  const todayA=appts.filter(a=>a.date===today);
  const monthA=appts.filter(a=>a.date.startsWith(curMonth));
  const pending=appts.filter(a=>a.status==='pending');
  const rev=(list)=>list.filter(a=>a.status!=='cancelled').reduce((s,a)=>s+(getSvc(a.serviceId).price||0),0);
  const todayRev=rev(todayA);
  const monthRev=rev(monthA);
  const done=appts.filter(a=>a.status==='done');

  /* Top serviços */
  const svcRank=useMemo(()=>{
    const map={};
    done.forEach(a=>{
      const s=getSvc(a.serviceId);
      if(!s.id)return;
      map[s.id]=map[s.id]||{...s,count:0,rev:0};
      map[s.id].count++;
      map[s.id].rev+=s.price||0;
    });
    return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,5);
  },[done]);

  /* Top clientes */
  const clientRank=useMemo(()=>{
    const map={};
    done.forEach(a=>{
      const s=getSvc(a.serviceId);
      map[a.clientId]=map[a.clientId]||{id:a.clientId,name:a.clientName,count:0,rev:0};
      map[a.clientId].count++;
      map[a.clientId].rev+=s.price||0;
    });
    return Object.values(map).sort((a,b)=>b.count-a.count).slice(0,5);
  },[done]);

  const kpis=[
    {icon:'📅',label:'Agend. Hoje',value:todayA.filter(a=>a.status!=='cancelled').length,sub:'agendamentos',color:'#d63371'},
    {icon:'⏳',label:'Pendentes',  value:pending.length,sub:'aguardando confirmação',color:'#d97706'},
    {icon:'💰',label:'Receita Hoje',value:fmtRi(todayRev),sub:'serviços confirmados',color:'#059669'},
    {icon:'📈',label:'Receita Mês', value:fmtRi(monthRev),sub:'mês corrente',color:'#7c3aed'},
  ];

  return(
    <div>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:24,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px'}}>Dashboard</h1>
        <p style={{color:'#78716c',fontSize:13,marginTop:3}}>Visão geral do seu salão</p>
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr 1fr':'repeat(auto-fit,minmax(200px,1fr))',gap:10,marginBottom:20}}>
        {kpis.map(k=><KPI key={k.label} {...k}/>)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr':'1fr 1fr',gap:14}}>
        {/* Top Serviços */}
        <div className="card card-p">
          <h3 style={{fontSize:14,fontWeight:700,color:'#1c1917',marginBottom:16,display:'flex',alignItems:'center',gap:7}}>
            <span>🏆</span> Top Serviços
          </h3>
          {svcRank.length===0?<p style={{color:'#a8a29e',fontSize:13}}>Sem dados</p>:
            svcRank.map((s,i)=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<svcRank.length-1?'1px solid #f0ede8':'none'}}>
                <span style={{fontSize:9,fontWeight:800,color:'#d6d3d1',width:14,textAlign:'right',flexShrink:0}}>#{i+1}</span>
                <span style={{fontSize:18,flexShrink:0}}>{s.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:600,fontSize:13,color:'#1c1917',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</p>
                  <p style={{fontSize:11,color:'#a8a29e'}}>{s.count}x realizados</p>
                </div>
                <span style={{fontWeight:700,fontSize:13,color:'#d63371',flexShrink:0}}>{fmtRi(s.rev)}</span>
              </div>
            ))
          }
        </div>

        {/* Top Clientes */}
        <div className="card card-p">
          <h3 style={{fontSize:14,fontWeight:700,color:'#1c1917',marginBottom:16,display:'flex',alignItems:'center',gap:7}}>
            <span>👑</span> Top Clientes
          </h3>
          {clientRank.length===0?<p style={{color:'#a8a29e',fontSize:13}}>Sem dados</p>:
            clientRank.map((c,i)=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<clientRank.length-1?'1px solid #f0ede8':'none'}}>
                <div style={{
                  width:32,height:32,borderRadius:'50%',
                  background:'linear-gradient(135deg,#fff0f5,#fce7ef)',
                  border:'1px solid #fce7ef',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:13,fontWeight:700,color:'#d63371',flexShrink:0,
                }}>{c.name[0]}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:600,fontSize:13,color:'#1c1917',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</p>
                  <p style={{fontSize:11,color:'#a8a29e'}}>{c.count} visitas</p>
                </div>
                <span style={{fontWeight:700,fontSize:13,color:'#059669',flexShrink:0}}>{fmtRi(c.rev)}</span>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

/* ── Hoje Tab ─────────────────────────────────────────── */
function TodayTab({appts,allAppts,services,getSvc,onUpdate,onAdd,clients}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({clientName:'',clientPhone:'',serviceId:'s1',date:todayStr(),time:''});
  const [saving,setSaving]=useState(false);
  const today=todayStr();
  const nowT=new Date().toTimeString().slice(0,5);

  const taken=allAppts.filter(a=>a.date===form.date&&a.status!=='cancelled').map(a=>a.time);
  const avail=TIME_SLOTS.filter(t=>!taken.includes(t));

  const active=[...appts].filter(a=>a.status!=='cancelled'&&a.status!=='done').sort((a,b)=>a.time.localeCompare(b.time));
  const rest=[...appts].filter(a=>a.status==='cancelled'||a.status==='done').sort((a,b)=>a.time.localeCompare(b.time));
  const total=active.length+rest.length;
  const progress=total>0?Math.round((rest.filter(a=>a.status==='done').length/total)*100):0;

  const save=async()=>{
    if(!form.clientName.trim()||!form.time){alert('Preencha todos os campos obrigatórios.');return}
    setSaving(true);
    await onAdd({...form,clientId:'manual-'+uid()});
    setSaving(false);setModal(false);
    setForm({clientName:'',clientPhone:'',serviceId:'s1',date:todayStr(),time:''});
  };

  /* Preencher cliente ao selecionar */
  const fillClient=e=>{
    const c=clients.find(x=>x.id===e.target.value);
    if(c)setForm(f=>({...f,clientName:c.name,clientPhone:c.phone}));
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:14}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px'}}>Agenda de Hoje</h1>
          <p style={{color:'#78716c',fontSize:13,marginTop:2}}>{fmtDay(today)}, {fmtDate(today)} · {active.length} ativo{active.length!==1?'s':''}</p>
        </div>
        <Btn onClick={()=>setModal(true)} sz="md">+ Novo Agendamento</Btn>
      </div>

      {/* Barra progresso */}
      {total>0&&(
        <div className="card" style={{padding:'16px 22px',marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,color:'#78716c'}}>Progresso do dia</span>
            <span style={{fontSize:12,fontWeight:700,color:'#1c1917'}}>{rest.filter(a=>a.status==='done').length}/{total} concluídos</span>
          </div>
          <div style={{height:7,background:'#f0ede8',borderRadius:7,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#d63371,#b5274f)',borderRadius:7,transition:'width .6s ease'}}/>
          </div>
        </div>
      )}

      {/* Timeline */}
      {active.length===0&&rest.length===0?(
        <div className="card" style={{textAlign:'center',padding:'56px 24px'}}>
          <div style={{fontSize:44,marginBottom:14}}>🌸</div>
          <p style={{fontWeight:700,fontSize:15,fontFamily:"'Playfair Display',serif",color:'#1c1917',marginBottom:4}}>Nenhum agendamento hoje</p>
          <p style={{color:'#a8a29e',fontSize:13}}>Adicione o primeiro usando o botão acima</p>
        </div>
      ):(
        <>
          {active.map(a=>(
            <div key={a.id} style={{display:'flex',gap:12,marginBottom:8}}>
              <div style={{width:52,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:14}}>
                <span style={{fontSize:11,fontWeight:700,color:a.time<=nowT?'#a8a29e':'#1c1917',letterSpacing:'-.3px'}}>{a.time}</span>
                <div style={{flex:1,width:1.5,background:a.time<=nowT?'#e7e5e4':'#fce7ef',marginTop:6,borderRadius:1,minHeight:20}}/>
              </div>
              <div style={{flex:1}}>
                <ApptCard a={a} getSvc={getSvc} compact
                  onConfirm={a.status==='pending'?id=>onUpdate(id,'confirmed'):null}
                  onCancel={id=>onUpdate(id,'cancelled')}
                  onDone={a.status==='confirmed'?id=>onUpdate(id,'done'):null}/>
              </div>
            </div>
          ))}
          {rest.length>0&&<>
            <p style={{fontSize:11,fontWeight:700,color:'#d6d3d1',textTransform:'uppercase',letterSpacing:'.08em',margin:'18px 0 10px'}}>Concluídos · Cancelados</p>
            {rest.map(a=><ApptCard key={a.id} a={a} getSvc={getSvc} compact/>)}
          </>}
        </>
      )}

      {/* Modal novo agendamento */}
      <Modal open={modal} onClose={()=>setModal(false)} title="Novo Agendamento" width={500}>
        <Field label="Selecionar cliente cadastrada (opcional)">
          <select className="field" defaultValue="" onChange={fillClient}>
            <option value="">— Digitar manualmente —</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name} · {c.phone}</option>)}
          </select>
        </Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Field label="Nome da cliente *">
            <input className="field" value={form.clientName} onChange={e=>setForm({...form,clientName:e.target.value})} placeholder="Nome"/>
          </Field>
          <Field label="Telefone">
            <input className="field" value={form.clientPhone}
              onChange={e=>setForm({...form,clientPhone:fmtPhone(e.target.value)})}
              placeholder="(11) 99999-9999" maxLength={15}/>
          </Field>
        </div>
        <Field label="Serviço *">
          <select className="field" value={form.serviceId} onChange={e=>setForm({...form,serviceId:e.target.value})}>
            {[{id:'s1',name:'Manicure Simples',icon:'🌸',price:45},{id:'s2',name:'Pedicure Completa',icon:'🦶',price:60},{id:'s3',name:'Gel Alongado',icon:'💅',price:120},{id:'s4',name:'Esmaltação em Gel',icon:'✨',price:80},{id:'s5',name:'Combo Mani + Pedi',icon:'👑',price:95}].map(s=>(
              <option key={s.id} value={s.id}>{s.icon} {s.name} — {fmtRi(s.price)}</option>
            ))}
          </select>
        </Field>
        <Field label="Data *">
          <input className="field" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value,time:''})}/>
        </Field>
        <Field label="Horário *">
          {avail.length===0?<p style={{fontSize:13,color:'#dc2626',fontWeight:500}}>Sem horários disponíveis nessa data</p>:(
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
              {avail.map(t=>(
                <button key={t} onClick={()=>setForm({...form,time:t})} style={{
                  padding:'9px 4px',border:`1.5px solid ${form.time===t?'#d63371':'#e7e5e4'}`,
                  borderRadius:8,background:form.time===t?'#fff0f5':'#fff',
                  color:form.time===t?'#d63371':'#44403c',fontWeight:form.time===t?700:400,
                  fontSize:12,cursor:'pointer',transition:'all .15s',
                }}>{t}</button>
              ))}
            </div>
          )}
        </Field>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <Btn v="ghost" onClick={()=>setModal(false)} full>Cancelar</Btn>
          <Btn loading={saving} onClick={save} full>Salvar Agendamento</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ── Calendário Tab ────────────────────────────────────── */
function CalendarTab({appts,getSvc,onUpdate,onAdd,allAppts,services,clients}){
  const [selDate,setSelDate]=useState(todayStr());
  const [viewYear,setViewYear]=useState(new Date().getFullYear());
  const [viewMonth,setViewMonth]=useState(new Date().getMonth());
  const [showDay,setShowDay]=useState(false);
  const today=todayStr();
  const isMob=useIsMobile();

  /* Mapa de datas → contagem */
  const dateMap=useMemo(()=>{
    const m={};
    appts.forEach(a=>{
      if(a.status!=='cancelled'){m[a.date]=(m[a.date]||0)+1}
    });
    return m;
  },[appts]);

  /* Dias do calendário */
  const calDays=useMemo(()=>{
    const firstDOW=getFirstDOW(viewYear,viewMonth);
    const daysInMonth=getDaysInMonth(viewYear,viewMonth);
    const prevDays=getDaysInMonth(viewYear,viewMonth-1);
    const cells=[];
    for(let i=firstDOW-1;i>=0;i--)
      cells.push({d:new Date(viewYear,viewMonth-1,prevDays-i).toISOString().split('T')[0],other:true});
    for(let d=1;d<=daysInMonth;d++)
      cells.push({d:new Date(viewYear,viewMonth,d).toISOString().split('T')[0],other:false});
    const rem=42-cells.length;
    for(let d=1;d<=rem;d++)
      cells.push({d:new Date(viewYear,viewMonth+1,d).toISOString().split('T')[0],other:true});
    return cells;
  },[viewYear,viewMonth]);

  const dayAppts=appts.filter(a=>a.date===selDate).sort((a,b)=>a.time.localeCompare(b.time));
  const active=dayAppts.filter(a=>a.status!=='cancelled'&&a.status!=='done');
  const rest=dayAppts.filter(a=>a.status==='cancelled'||a.status==='done');

  const prevMonth=()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1)}else setViewMonth(m=>m-1)};
  const nextMonth=()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1)}else setViewMonth(m=>m+1)};

  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px',marginBottom:24}}>Calendário</h1>

      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr':'300px 1fr',gap:isMob?14:20,alignItems:'start'}}>
        {/* Calendário */}
        <div className="card card-p" style={{overflow:'hidden',padding:'18px 16px'}}>
          {/* Cabeçalho mês */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <button onClick={prevMonth} style={{background:'none',border:'1px solid #e7e5e4',borderRadius:8,width:30,height:30,cursor:'pointer',color:'#78716c',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>‹</button>
            <p style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{MONFULL[viewMonth]} {viewYear}</p>
            <button onClick={nextMonth} style={{background:'none',border:'1px solid #e7e5e4',borderRadius:8,width:30,height:30,cursor:'pointer',color:'#78716c',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>›</button>
          </div>

          {/* Dias da semana */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:6}}>
            {['D','S','T','Q','Q','S','S'].map((d,i)=>(
              <div key={i} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#a8a29e',padding:'3px 0'}}>{d}</div>
            ))}
          </div>

          {/* Dias */}
          <div className="cal-grid">
            {calDays.map(({d,other})=>{
              const isToday=d===today;
              const isSel=d===selDate;
              const cnt=dateMap[d]||0;
              return(
                <div key={d}
                  onClick={()=>setSelDate(d)}

    </div>
  );
}

/* ── Relatórios Tab ─────────────────────────────────────── */
function ReportTab({appts,services,getSvc}){
  const isMob=useIsMobile();
  const [period,setPeriod]=useState('month');
  const today=todayStr();
  const [y,m]=today.split('-').map(Number);

  /* Filtrar agendamentos por período */
  const filtered=useMemo(()=>{
    if(period==='week'){
      const d=new Date();
      const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      const a=mon.toISOString().split('T')[0];
      const b=sun.toISOString().split('T')[0];
      return appts.filter(x=>x.date>=a&&x.date<=b);
    }
    if(period==='month') return appts.filter(a=>a.date.startsWith(`${y}-${String(m).padStart(2,'0')}`));
    if(period==='quarter'){
      const q=Math.ceil(m/3);
      const ms=Array.from({length:3},(_,i)=>String((q-1)*3+1+i).padStart(2,'0'));
      return appts.filter(a=>ms.some(mm=>a.date.startsWith(`${y}-${mm}`)));
    }
    return appts; // year
  },[appts,period,y,m]);

  const done=filtered.filter(a=>a.status==='done');
  const cancelled=filtered.filter(a=>a.status==='cancelled');
  const active=filtered.filter(a=>a.status==='confirmed'||a.status==='pending');
  const totalRev=done.reduce((s,a)=>s+(getSvc(a.serviceId).price||0),0);
  const avgTicket=done.length?totalRev/done.length:0;

  /* Receita por serviço */
  const svcData=useMemo(()=>{
    const map={};
    done.forEach(a=>{
      const s=getSvc(a.serviceId);
      if(!s.id)return;
      map[s.id]=map[s.id]||{...s,count:0,rev:0};
      map[s.id].count++;
      map[s.id].rev+=s.price||0;
    });
    return Object.values(map).sort((a,b)=>b.rev-a.rev);
  },[done]);
  const maxRev=Math.max(...svcData.map(s=>s.rev),1);

  /* Receita diária (últimos 14 dias se mês) */
  const dailyData=useMemo(()=>{
    const days=period==='week'?7:period==='month'?14:period==='quarter'?12:12;
    const isMonth=period==='month'||period==='week';
    if(isMonth){
      return Array.from({length:days},(_,i)=>{
        const d=new Date();d.setDate(d.getDate()-(days-1-i));
        const ds=d.toISOString().split('T')[0];
        const rev=done.filter(a=>a.date===ds).reduce((s,a)=>s+(getSvc(a.serviceId).price||0),0);
        return{label:String(+ds.split('-')[2]).padStart(2,'0'),rev};
      });
    }
    // Quarter/year: por mês
    return Array.from({length:days},(_,i)=>{
      const d=new Date(y,m-1-days+1+i,1);
      const ym=d.toISOString().slice(0,7);
      const rev=done.filter(a=>a.date.startsWith(ym)).reduce((s,a)=>s+(getSvc(a.serviceId).price||0),0);
      return{label:MONL[d.getMonth()],rev};
    });
  },[done,period]);
  const maxDaily=Math.max(...dailyData.map(d=>d.rev),1);

  const BARCLR=['#d63371','#b5274f','#f472b6','#fb7185','#fda4af'];

  return(
    <div>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px',marginBottom:2}}>Relatórios</h1>
        <p style={{color:'#78716c',fontSize:13,marginBottom:14}}>Financeiro e procedimentos</p>
        <div style={{display:'flex',background:'#f7f5f2',borderRadius:10,padding:3,gap:2,width:'fit-content'}}>
          {[['week','Semana'],['month','Mês'],['quarter','Trimestre'],['year','Ano']].map(([k,l])=>(
            <button key={k} onClick={()=>setPeriod(k)} style={{
              padding:isMob?'8px 12px':'7px 14px',border:'none',borderRadius:8,
              background:period===k?'#fff':'transparent',
              color:period===k?'#1c1917':'#78716c',
              fontWeight:period===k?700:400,fontSize:isMob?13:12,
              boxShadow:period===k?'0 1px 4px rgba(0,0,0,.08)':'none',
              transition:'all .2s',cursor:'pointer',
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* KPIs financeiros */}
      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr 1fr':'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:20}}>
        {[
          {icon:'💰',label:'Faturamento',value:fmtR(totalRev),color:'#059669'},
          {icon:'📋',label:'Concluídos', value:done.length,color:'#d63371'},
          {icon:'💳',label:'Ticket Médio',value:fmtRi(avgTicket),color:'#7c3aed'},
          {icon:'❌',label:'Cancelamentos',value:cancelled.length,color:'#dc2626'},
          {icon:'🔄',label:'Em andamento',value:active.length,color:'#d97706'},
        ].map(k=><KPI key={k.label} {...k} style={{padding:'16px 18px'}}/>)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr':'1fr 1fr',gap:14,marginBottom:16}}>
        {/* Gráfico receita por dia */}
        <div className="card card-p">
          <h3 style={{fontSize:13,fontWeight:700,color:'#1c1917',marginBottom:4}}>📈 Receita por período</h3>
          <p style={{fontSize:11,color:'#a8a29e',marginBottom:16}}>Total: {fmtR(totalRev)}</p>
          <div className="bar-chart" style={{height:isMob?100:140}}>
            {(isMob?dailyData.slice(-7):dailyData).map((d,i)=>{
              const pct=d.rev/maxDaily;
              return(
                <div key={i} className="bar-wrap" title={`${d.label}: ${fmtR(d.rev)}`}>
                  <div className="bar-val">{d.rev>0?fmtRi(d.rev):''}</div>
                  <div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end',position:'relative'}}>
                    <div className="bar" style={{
                      '--h':`${Math.max(pct*100,d.rev>0?4:0)}%`,
                      height:`${Math.max(pct*100,d.rev>0?4:0)}%`,
                      background:d.rev>0?`linear-gradient(180deg,#d63371,#b5274f)`:'#f0ede8',
                      animationDelay:`${i*0.03}s`,
                    }}/>
                  </div>
                  <div className="bar-label">{d.label}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Procedimentos */}
        <div className="card card-p">
          <h3 style={{fontSize:13,fontWeight:700,color:'#1c1917',marginBottom:4}}>💅 Receita por serviço</h3>
          <p style={{fontSize:11,color:'#a8a29e',marginBottom:14}}>{done.length} procedimentos realizados</p>
          {svcData.length===0?<p style={{color:'#a8a29e',fontSize:13}}>Sem dados no período</p>:
            svcData.map((s,i)=>{
              const pct=maxRev>0?s.rev/maxRev:0;
              return(
                <div key={s.id} style={{marginBottom:13}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:600,color:'#44403c'}}>{s.icon} {s.name}</span>
                    <span style={{fontSize:12,fontWeight:700,color:'#d63371'}}>{fmtR(s.rev)}</span>
                  </div>
                  <div style={{height:7,background:'#f0ede8',borderRadius:7,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct*100}%`,background:BARCLR[i%BARCLR.length],borderRadius:7,transition:'width .7s ease',animationDelay:`${i*0.1}s`}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                    <span style={{fontSize:10,color:'#a8a29e'}}>{s.count} realizados</span>
                    <span style={{fontSize:10,color:'#a8a29e'}}>{Math.round(pct*100)}%</span>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>

      {/* Tabela detalhada */}
      <div className="card card-p">
        <h3 style={{fontSize:13,fontWeight:700,color:'#1c1917',marginBottom:16}}>📋 Detalhamento de procedimentos</h3>
        {done.length===0?<p style={{color:'#a8a29e',fontSize:13}}>Sem procedimentos concluídos no período</p>:(
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{width:isMob?'600px':'100%',minWidth:isMob?'600px':'auto',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{borderBottom:'1.5px solid #f0ede8'}}>
                  {['Data','Hora','Cliente','Serviço','Valor'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'8px 12px',color:'#a8a29e',fontWeight:700,textTransform:'uppercase',fontSize:10,letterSpacing:'.06em',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...done].reverse().slice(0,20).map(a=>{
                  const s=getSvc(a.serviceId);
                  return(
                    <tr key={a.id} style={{borderBottom:'1px solid #f7f5f2'}}>
                      <td style={{padding:'10px 12px',color:'#78716c'}}>{fmtDate(a.date)}</td>
                      <td style={{padding:'10px 12px',color:'#78716c'}}>{a.time}</td>
                      <td style={{padding:'10px 12px',color:'#1c1917',fontWeight:600}}>{a.clientName}</td>
                      <td style={{padding:'10px 12px',color:'#44403c'}}>{s.icon} {s.name}</td>
                      <td style={{padding:'10px 12px',color:'#d63371',fontWeight:700}}>{fmtR(s.price||0)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:'2px solid #f0ede8',background:'#fafaf9'}}>
                  <td colSpan={4} style={{padding:'10px 12px',fontWeight:700,color:'#44403c',fontSize:12}}>TOTAL ({done.length} procedimentos)</td>
                  <td style={{padding:'10px 12px',fontWeight:800,color:'#059669',fontSize:13}}>{fmtR(totalRev)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Clientes Tab ─────────────────────────────────────────── */
function ClientsTab({clients,appts,getSvc,onAdd,toast}){
  const isMob=useIsMobile();
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [form,setForm]=useState({name:'',phone:'',email:'',notes:''});
  const [saving,setSaving]=useState(false);

  const filtered=clients.filter(c=>
    c.name.toLowerCase().includes(search.toLowerCase())||
    c.phone.includes(search)||
    (c.email||'').toLowerCase().includes(search.toLowerCase())
  );

  /* Agendamentos por cliente */
  const clientStats=useMemo(()=>{
    const map={};
    appts.filter(a=>a.status==='done').forEach(a=>{
      const s=getSvc(a.serviceId);
      map[a.clientId]=map[a.clientId]||{count:0,rev:0,last:''};
      map[a.clientId].count++;
      map[a.clientId].rev+=s.price||0;
      if(a.date>map[a.clientId].last)map[a.clientId].last=a.date;
    });
    return map;
  },[appts]);

  const resetForm=()=>setForm({name:'',phone:'',email:'',notes:''});

  const save=async()=>{
    if(!form.name.trim()){toast('Nome é obrigatório','err');return}
    if(!form.phone.trim()){toast('Telefone é obrigatório','err');return}
    setSaving(true);
    try{
      await onAdd({...form});
      toast('Cliente cadastrada! ✅');
      resetForm();setModal(false);
    }catch(e){toast(e.message,'err')}
    finally{setSaving(false)}
  };

  const openEdit=c=>{
    setForm({name:c.name,phone:c.phone,email:c.email||'',notes:c.notes||''});
    setEditModal(c);
  };

  const saveEdit=async()=>{
    setSaving(true);
    try{
      await API.updateClient(editModal.id,form);
      toast('Dados atualizados ✅');
      setEditModal(null);resetForm();
      // reload via page re-fetch would happen via polling; force here:
      window.location.reload();
    }catch(e){toast(e.message,'err')}
    finally{setSaving(false)}
  };

  const ClientForm=({onSave})=>(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Field label="Nome completo *">
          <input className="field" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Maria Oliveira"/>
        </Field>
        <Field label="WhatsApp / Telefone *">
          <input className="field" value={form.phone} onChange={e=>setForm({...form,phone:fmtPhone(e.target.value)})} placeholder="(11) 99999-9999" maxLength={15}/>
        </Field>
      </div>
      <Field label="E-mail">
        <input className="field" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@exemplo.com"/>
      </Field>
      <Field label="Observações" hint="Alergias, preferências, etc.">
        <textarea className="field" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Ex: Alérgica a acetona" rows={3} style={{resize:'vertical'}}/>
      </Field>
      <div style={{display:'flex',gap:10,marginTop:8}}>
        <Btn v="ghost" onClick={()=>{setModal(false);setEditModal(null);resetForm()}} full>Cancelar</Btn>
        <Btn loading={saving} onClick={onSave} full>Salvar</Btn>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:14}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px'}}>Clientes</h1>
          <p style={{color:'#78716c',fontSize:13,marginTop:2}}>{clients.length} clientes cadastradas</p>
        </div>
        <Btn onClick={()=>{resetForm();setModal(true)}} sz="md">+ Nova Cliente</Btn>
      </div>

      {/* Busca */}
      <div style={{position:'relative',marginBottom:18}}>
        <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:'#a8a29e',fontSize:15}}>🔍</span>
        <input className="field" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Buscar por nome, telefone ou e-mail..."
          style={{paddingLeft:38}}/>
      </div>

      {/* Lista */}
      {filtered.length===0?(
        <div className="card" style={{textAlign:'center',padding:'48px 24px'}}>
          <div style={{fontSize:40,marginBottom:12}}>👥</div>
          <p style={{fontWeight:700,color:'#1c1917',marginBottom:4}}>Nenhuma cliente encontrada</p>
          <p style={{color:'#a8a29e',fontSize:13,marginBottom:18}}>Cadastre sua primeira cliente</p>
          <Btn v="soft" onClick={()=>{resetForm();setModal(true)}}>+ Cadastrar Cliente</Btn>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map(c=>{
            const stats=clientStats[c.id]||{count:0,rev:0,last:''};
            return(
              <div key={c.id} className="card ch" style={{padding:'18px 22px'}}>
                <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                  {/* Avatar */}
                  <div style={{
                    width:46,height:46,borderRadius:'50%',flexShrink:0,
                    background:'linear-gradient(135deg,#fff0f5,#fce7ef)',
                    border:'1.5px solid #fce7ef',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:17,fontWeight:800,color:'#d63371',
                  }}>{c.name[0]}</div>

                  {/* Info */}
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{c.name}</span>
                      {stats.count>=5&&<span style={{fontSize:10,fontWeight:700,color:'#d63371',background:'#fff0f5',padding:'2px 8px',borderRadius:20,border:'1px solid #fce7ef'}}>VIP ⭐</span>}
                    </div>
                    <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
                      <span style={{fontSize:12,color:'#78716c'}}>📱 {c.phone}</span>
                      {c.email&&<span style={{fontSize:12,color:'#78716c'}}>✉ {c.email}</span>}
                    </div>
                    {c.notes&&<p style={{fontSize:11,color:'#a8a29e',marginTop:4,fontStyle:'italic'}}>"{c.notes}"</p>}
                  </div>

                  {/* Stats */}
                  {!isMob&&<div style={{display:'flex',gap:16,flexShrink:0}}>
                    {[
                      {l:'Visitas',v:stats.count,c:'#d63371'},
                      {l:'Gasto total',v:fmtRi(stats.rev),c:'#059669'},
                      {l:'Última visita',v:stats.last?fmtDate(stats.last):'—',c:'#78716c'},
                    ].map(s=>(
                      <div key={s.l} style={{textAlign:'center'}}>
                        <p style={{fontSize:14,fontWeight:700,color:s.c}}>{s.v}</p>
                        <p style={{fontSize:10,color:'#a8a29e',fontWeight:500}}>{s.l}</p>
                      </div>
                    ))}
                  </div>}

                  <Btn v="ghost" sz="sm" onClick={()=>openEdit(c)}>Editar</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Modal cadastro */}
      <Modal open={modal} onClose={()=>{setModal(false);resetForm()}} title="Cadastrar Nova Cliente" width={520}>
        <ClientForm onSave={save}/>
      </Modal>

      {/* Modal edição */}
      <Modal open={!!editModal} onClose={()=>{setEditModal(null);resetForm()}} title={`Editar: ${editModal?.name||''}`} width={520}>
        <ClientForm onSave={saveEdit}/>
      </Modal>
    </div>
  );
}

/* ── Serviços Tab ─────────────────────────────────────────── */
function ServicesTab({services,setSvcs,toast}){
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    if(!editing.name.trim()){toast('Nome obrigatório','err');return}
    setSaving(true);
    try{
      const updated=await API.updateService(editing.id,{name:editing.name,price:+editing.price,duration:+editing.duration,icon:editing.icon});
      setSvcs(updated);
      setEditing(null);
      toast('Serviço atualizado ✅');
    }catch(e){toast(e.message,'err')}
    finally{setSaving(false)}
  };

  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.4px',marginBottom:24}}>Serviços</h1>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(240px,100%),1fr))',gap:12}}>
        {services.map(s=>(
          <div key={s.id} className="card ch" style={{padding:'20px 22px'}}>
            <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}>
              <span style={{fontSize:30}}>{s.icon}</span>
              <div>
                <p style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{s.name}</p>
                <p style={{fontSize:12,color:'#78716c'}}>⏱ {s.duration} min</p>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:22,fontWeight:800,color:'#d63371',letterSpacing:'-.3px'}}>{fmtR(s.price)}</span>
              <Btn v="ghost" sz="sm" onClick={()=>setEditing({...s})}>Editar</Btn>
            </div>
          </div>
        ))}
      </div>

      <Modal open={!!editing} onClose={()=>setEditing(null)} title="Editar Serviço">
        {editing&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'72px 1fr',gap:14}}>
              <Field label="Ícone">
                <input className="field" value={editing.icon} onChange={e=>setEditing({...editing,icon:e.target.value})} style={{fontSize:22,textAlign:'center'}}/>
              </Field>
              <Field label="Nome do serviço *">
                <input className="field" value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})}/>
              </Field>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <Field label="Preço (R$)">
                <input className="field" type="number" value={editing.price} onChange={e=>setEditing({...editing,price:e.target.value})} min="0" step="5"/>
              </Field>
              <Field label="Duração (min)">
                <input className="field" type="number" value={editing.duration} onChange={e=>setEditing({...editing,duration:e.target.value})} min="10" step="5"/>
              </Field>
            </div>
            <div style={{display:'flex',gap:10,marginTop:6}}>
              <Btn v="ghost" onClick={()=>setEditing(null)} full>Cancelar</Btn>
              <Btn loading={saving} onClick={save} full>Salvar alterações</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ── useIsMobile hook ──────────────────────────────────── */
function useIsMobile(bp=720){
  const [mob,setMob]=useState(()=>window.innerWidth<=bp);
  useEffect(()=>{
    const h=()=>setMob(window.innerWidth<=bp);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[bp]);
  return mob;
}

/* ══════════════════════════════════════════
   CLIENT PORTAL
══════════════════════════════════════════ */
function ClientPortal({user,onLogout}){
  const [tab,setTab]=useState('book');
  const [appts,setAppts]=useState([]);
  const [services,setSvcs]=useState([]);
  const [loading,setLoading]=useState(true);
  const {list:toasts,add:toast}=useToast();
  const pollRef=useRef();

  const load=useCallback(async(quiet=false)=>{
    if(!quiet)setLoading(true);
    try{
      const[a,s]=await Promise.all([API.getAppointments({clientId:user.id}),API.getServices()]);
      setAppts(a);setSvcs(s);
    }catch{toast('Erro ao carregar','err')}
    finally{setLoading(false)}
  },[user.id]);

  useEffect(()=>{
    load();
    pollRef.current=setInterval(()=>load(true),7000);
    return()=>clearInterval(pollRef.current);
  },[load]);

  const book=async(data)=>{
    try{
      const a=await API.createAppointment({...data,clientId:user.id,clientName:user.name,clientPhone:user.phone,status:'pending'});
      setAppts(p=>[...p,a]);
      toast('Agendamento solicitado! ✅ Aguarde confirmação.');
      setTab('mine');
    }catch(e){toast(e.message,'err')}
  };

  const cancel=async(id)=>{
    try{
      await API.updateAppointment(id,{status:'cancelled'});
      setAppts(p=>p.map(a=>a.id===id?{...a,status:'cancelled'}:a));
      toast('Agendamento cancelado','warn');
    }catch(e){toast(e.message,'err')}
  };

  const getSvc=id=>services.find(s=>s.id===id)||{};
  const upcoming=appts.filter(a=>a.date>=todayStr()&&a.status!=='cancelled'&&a.status!=='done');

  return(
    <div style={{minHeight:'100vh',background:'#f7f5f2'}}>
      <Toasts list={toasts}/>

      {/* Header */}
      <header style={{
        background:'#fff',borderBottom:'1px solid #e7e5e4',
        position:'sticky',top:0,zIndex:200,
        padding:'0 16px',height:58,
        display:'flex',alignItems:'center',justifyContent:'space-between',
        boxShadow:'0 1px 4px rgba(0,0,0,.04)',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{
            width:36,height:36,
            background:'linear-gradient(135deg,#d63371,#b5274f)',
            borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:17,boxShadow:'0 2px 10px rgba(214,51,113,.3)',
          }}>💅</div>
          <div>
            <p style={{fontWeight:700,fontSize:14,color:'#1c1917',fontFamily:"'Playfair Display',serif",lineHeight:1.2}}>Belle Studio</p>
            <p style={{fontSize:11,color:'#a8a29e',lineHeight:1.2}}>Olá, {user.name.split(' ')[0]}! 📱 {user.phone}</p>
          </div>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {upcoming.length>0&&(
            <span style={{
              background:'#fff0f5',color:'#d63371',fontSize:11,fontWeight:600,
              padding:'4px 11px',borderRadius:20,border:'1px solid #fce7ef',
            }}>{upcoming.length} próximo{upcoming.length!==1?'s':''}</span>
          )}
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:20,background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#059669',animation:'pulse2 2s infinite'}}/>
            <span style={{fontSize:10,fontWeight:600,color:'#059669'}}>ao vivo</span>
          </div>
          <button onClick={onLogout} style={{background:'none',border:'1px solid #e7e5e4',borderRadius:8,padding:'6px 13px',color:'#78716c',fontSize:12,fontWeight:500,cursor:'pointer'}}>Sair</button>
        </div>
      </header>

      {/* Tab nav */}
      <div style={{background:'#fff',borderBottom:'1px solid #e7e5e4',padding:'0 24px',display:'flex',gap:2}}>
        {[
          ['book','📅 Agendar'],
          ['mine',`📋 Meus Agendamentos${upcoming.length?` (${upcoming.length})`:''}`],
        ].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            background:'none',border:'none',padding:'14px 14px 11px',
            borderBottom:tab===k?'2.5px solid #d63371':'2.5px solid transparent',
            color:tab===k?'#d63371':'#78716c',
            fontWeight:tab===k?700:500,fontSize:13,cursor:'pointer',transition:'all .15s',
          }}>{l}</button>
        ))}
      </div>

      <div style={{padding:'20px 14px',maxWidth:600,margin:'0 auto'}}>
        {loading?(
          <div style={{display:'flex',justifyContent:'center',paddingTop:80}}><Spinner sz={40}/></div>
        ):tab==='book'?(
          <BookingWizard services={services} allAppts={appts} onBook={book} user={user}/>
        ):(
          <MyBookings appts={appts} getSvc={getSvc} onCancel={cancel} user={user}/>
        )}
      </div>
    </div>
  );
}

/* ── Booking Wizard ───────────────────────────────────────── */
function BookingWizard({services,allAppts,onBook,user}){
  const [step,setStep]=useState(0);
  const [svc,setSvc]=useState(null);
  const [date,setDate]=useState(todayStr());
  const [time,setTime]=useState('');
  const [busy,setBusy]=useState(false);

  const taken=allAppts.filter(a=>a.date===date&&a.status!=='cancelled').map(a=>a.time);
  const avail=TIME_SLOTS.filter(t=>!taken.includes(t));

  const reset=()=>{setStep(0);setSvc(null);setDate(todayStr());setTime('')};

  const confirm=async()=>{
    setBusy(true);
    try{await onBook({serviceId:svc.id,date,time});reset()}
    finally{setBusy(false)}
  };

  const STEPS=['Serviço','Data','Horário','Confirmar'];

  return(
    <div className="fu">
      <h1 style={{fontSize:20,fontWeight:800,color:'#1c1917',fontFamily:"'Playfair Display',serif",letterSpacing:'-.3px',marginBottom:4}}>Agendar Serviço</h1>
      <p style={{color:'#78716c',fontSize:13,marginBottom:22}}>Rápido, fácil e sem complicação</p>

      {/* Steps */}
      <div style={{display:'flex',alignItems:'center',marginBottom:26,gap:0}}>
        {STEPS.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{
                width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:700,flexShrink:0,transition:'all .3s',
                background:step>i?'#059669':step===i?'#d63371':'#f0ede8',
                color:step>=i?'#fff':'#a8a29e',
                boxShadow:step===i?'0 0 0 4px rgba(214,51,113,.18)':'none',
              }}>{step>i?'✓':i+1}</div>
              <span style={{fontSize:11,fontWeight:step===i?700:400,color:step===i?'#1c1917':'#a8a29e',whiteSpace:'nowrap',display:i===0||i===3?'block':'none'}}>{s}</span>
            </div>
            {i<3&&<div style={{flex:1,height:1.5,background:step>i?'#059669':'#e7e5e4',margin:'0 4px',minWidth:12,transition:'background .4s'}}/>}
          </React.Fragment>
        ))}
      </div>

      {/* Step 0: Serviço */}
      {step===0&&(
        <div className="sl">
          <p style={{fontSize:11,fontWeight:700,color:'#a8a29e',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Escolha o serviço</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {services.map(s=>(
              <div key={s.id} onClick={()=>{setSvc(s);setStep(1)}} style={{
                display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'16px 18px',borderRadius:14,
                border:`2px solid ${svc?.id===s.id?'#d63371':'#e7e5e4'}`,
                background:svc?.id===s.id?'#fff0f5':'#fff',
                cursor:'pointer',transition:'all .15s',
              }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#d63371';e.currentTarget.style.background='#fff0f5'}}
              onMouseLeave={e=>{if(svc?.id!==s.id){e.currentTarget.style.borderColor='#e7e5e4';e.currentTarget.style.background='#fff'}}}
              >
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:28}}>{s.icon}</span>
                  <div>
                    <p style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{s.name}</p>
                    <p style={{fontSize:12,color:'#78716c'}}>⏱ {s.duration} min</p>
                  </div>
                </div>
                <p style={{fontWeight:800,fontSize:18,color:'#d63371'}}>{fmtRi(s.price)}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Step 1: Data */}
      {step===1&&(
        <div className="sl">
          <button onClick={()=>setStep(0)} style={{background:'none',border:'none',color:'#78716c',fontSize:13,cursor:'pointer',marginBottom:16,padding:0,display:'flex',alignItems:'center',gap:5}}>← Voltar</button>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',background:'#fff0f5',borderRadius:12,marginBottom:22,border:'1px solid #fce7ef'}}>
            <span style={{fontSize:24}}>{svc.icon}</span>
            <div>
              <p style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{svc.name}</p>
              <p style={{fontSize:12,color:'#78716c'}}>{fmtRi(svc.price)} · {svc.duration} min</p>
            </div>
          </div>
          <Field label="Data do atendimento">
            <input className="field" type="date" value={date} onChange={e=>setDate(e.target.value)} min={todayStr()}/>
          </Field>
          <Btn onClick={()=>setStep(2)} full sz="lg" style={{marginTop:6}}>Ver horários disponíveis →</Btn>
        </div>
      )}

      {/* Step 2: Horário */}
      {step===2&&(
        <div className="sl">
          <button onClick={()=>setStep(1)} style={{background:'none',border:'none',color:'#78716c',fontSize:13,cursor:'pointer',marginBottom:16,padding:0,display:'flex',alignItems:'center',gap:5}}>← Voltar</button>
          <p style={{fontWeight:700,fontSize:15,color:'#1c1917',marginBottom:2}}>{fmtDay(date)}, {fmtDate(date)}</p>
          <p style={{fontSize:13,color:'#78716c',marginBottom:18}}>{avail.length} horário{avail.length!==1?'s':''} disponível{avail.length!==1?'is':''}</p>
          {avail.length===0?(
            <div className="card" style={{textAlign:'center',padding:36}}>
              <div style={{fontSize:36,marginBottom:10}}>😔</div>
              <p style={{color:'#78716c',fontWeight:500,marginBottom:14}}>Nenhum horário disponível nesta data</p>
              <Btn v="outline" sz="sm" onClick={()=>setStep(1)}>Escolher outra data</Btn>
            </div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {avail.map(t=>(
                <div key={t} onClick={()=>{setTime(t);setStep(3)}} style={{
                  padding:'14px 6px',textAlign:'center',borderRadius:12,
                  border:`2px solid ${time===t?'#d63371':'#e7e5e4'}`,
                  background:time===t?'#fff0f5':'#fff',cursor:'pointer',
                  fontWeight:700,fontSize:14,color:time===t?'#d63371':'#1c1917',
                  transition:'all .15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#d63371'}}
                onMouseLeave={e=>{if(time!==t)e.currentTarget.style.borderColor='#e7e5e4'}}
                >{t}</div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Step 3: Confirmar */}
      {step===3&&(
        <div className="sl">
          <button onClick={()=>setStep(2)} style={{background:'none',border:'none',color:'#78716c',fontSize:13,cursor:'pointer',marginBottom:16,padding:0,display:'flex',alignItems:'center',gap:5}}>← Voltar</button>
          <h3 style={{fontSize:16,fontWeight:700,color:'#1c1917',fontFamily:"'Playfair Display',serif",marginBottom:18}}>Confirme seu agendamento</h3>

          <div className="card" style={{marginBottom:18}}>
            {[
              ['Serviço',  `${svc?.icon} ${svc?.name}`],
              ['Data',     `${fmtDay(date)}, ${fmtDate(date)}`],
              ['Horário',  time],
              ['Duração',  `${svc?.duration} minutos`],
              ['Valor',    fmtR(svc?.price)],
              ['Telefone', user.phone],
            ].map(([k,v],i,arr)=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:i<arr.length-1?'1px solid #f7f5f2':'none'}}>
                <span style={{fontSize:13,color:'#78716c'}}>{k}</span>
                <span style={{fontSize:13,fontWeight:700,color:k==='Valor'?'#d63371':k==='Telefone'?'#059669':'#1c1917'}}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{padding:'14px 18px',background:'#fffbeb',borderRadius:12,border:'1px solid #fcd34d',marginBottom:20}}>
            <p style={{fontSize:13,color:'#92400e',fontWeight:700}}>📱 Confirmação via WhatsApp</p>
            <p style={{fontSize:12,color:'#b45309',marginTop:4}}>Você receberá a confirmação da sua manicure no número <strong>{user.phone}</strong> em breve.</p>
          </div>

          <Btn onClick={confirm} loading={busy} sz="lg" full>✅ Confirmar Agendamento</Btn>
        </div>
      )}
    </div>
  );
}

/* ── Meus Agendamentos ────────────────────────────────────── */
function MyBookings({appts,getSvc,onCancel,user}){
  const today=todayStr();
  const upcoming=appts.filter(a=>a.date>=today&&a.status!=='cancelled'&&a.status!=='done')
    .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const past=appts.filter(a=>a.date<today||a.status==='cancelled'||a.status==='done')
    .sort((a,b)=>b.date.localeCompare(a.date));

  const Row=({a})=>{
    const svc=getSvc(a.serviceId);
    const canCancel=(a.status==='pending'||a.status==='confirmed')&&a.date>=today;
    const [busy,setBusy]=useState(false);
    return(
      <div className="card ch" style={{marginBottom:10,padding:'18px 22px'}}>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{
            width:50,height:50,borderRadius:14,flexShrink:0,
            background:'linear-gradient(135deg,#fff0f5,#fce7ef)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:24,border:'1px solid #fce7ef',
          }}>{svc.icon||'💅'}</div>
          <div style={{flex:1,minWidth:140}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:14,color:'#1c1917'}}>{svc.name||'Serviço'}</span>
              <Badge status={a.status}/>
            </div>
            <p style={{fontSize:12,color:'#78716c'}}>{fmtFull(a.date,a.time)} · {fmtRi(svc.price||0)}</p>
          </div>
          {canCancel&&(
            <Btn v="danger" sz="sm" loading={busy} onClick={async()=>{
              if(!confirm('Deseja cancelar?'))return;
              setBusy(true);await onCancel(a.id);setBusy(false);
            }}>Cancelar</Btn>
          )}
        </div>
        {a.status==='pending'&&(
          <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid #f7f5f2',display:'flex',alignItems:'center',gap:8}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#d97706',animation:'pulse2 1.5s infinite'}}/>
            <p style={{fontSize:11,color:'#d97706',fontWeight:600}}>Aguardando confirmação da manicure · Será confirmado em {user.phone}</p>
          </div>
        )}
      </div>
    );
  };

  if(appts.length===0) return(
    <div className="card fu" style={{textAlign:'center',padding:'56px 24px'}}>
      <div style={{fontSize:44,marginBottom:14}}>🌸</div>
      <p style={{fontWeight:700,fontSize:16,fontFamily:"'Playfair Display',serif",color:'#1c1917',marginBottom:4}}>Nenhum agendamento ainda</p>
      <p style={{color:'#a8a29e',fontSize:13}}>Use a aba "Agendar" para marcar seu horário</p>
    </div>
  );

  return(
    <div className="fu">
      {upcoming.length>0&&<>
        <p style={{fontSize:11,fontWeight:700,color:'#78716c',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Próximos</p>
        {upcoming.map(a=><Row key={a.id} a={a}/>)}
      </>}
      {past.length>0&&<>
        <p style={{fontSize:11,fontWeight:700,color:'#d6d3d1',textTransform:'uppercase',letterSpacing:'.08em',margin:'22px 0 12px'}}>Histórico</p>
        {past.map(a=><Row key={a.id} a={a}/>)}
      </>}
    </div>
  );
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    API.init().then(()=>setReady(true));
  },[]);

  if(!ready) return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#f7f5f2',gap:16}}>
      <Spinner sz={44}/>
      <p style={{color:'#a8a29e',fontSize:13,fontWeight:500}}>Iniciando Belle Studio...</p>
    </div>
  );

  if(!user) return <LoginPage onLogin={setUser}/>;
  if(user.role==='owner') return <OwnerPortal onLogout={()=>setUser(null)}/>;
  return <ClientPortal user={user} onLogout={()=>setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
